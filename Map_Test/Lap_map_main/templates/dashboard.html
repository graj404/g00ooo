<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Dead Reckoning Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a3a;
        }
        .card h2 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .value {
            font-size: 36px;
            font-weight: bold;
            color: #00ff88;
        }
        .unit {
            font-size: 18px;
            color: #666;
            margin-left: 5px;
        }
        .map-container {
            grid-column: 1 / -1;
            height: 500px;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .status-item {
            text-align: center;
        }
        .status-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .status-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-top: 5px;
        }
        .lap-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
        }
        .connected {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #1a1a1a;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .disconnected {
            background: #ff4444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="connected" id="connection-status">● CONNECTED</div>
    
    <div class="container">
        <h1>🏎️ VEHICLE DEAD RECKONING SYSTEM</h1>
        
        <div class="grid">
            <div class="card">
                <h2>Position X</h2>
                <div class="value" id="pos-x">0.00<span class="unit">m</span></div>
            </div>
            
            <div class="card">
                <h2>Position Y</h2>
                <div class="value" id="pos-y">0.00<span class="unit">m</span></div>
            </div>
            
            <div class="card">
                <h2>Heading</h2>
                <div class="value" id="heading">0.0<span class="unit">°</span></div>
            </div>
            
            <div class="card">
                <h2>Velocity</h2>
                <div class="value" id="velocity">0.00<span class="unit">m/s</span></div>
            </div>
            
            <div class="card">
                <h2>RPM</h2>
                <div class="value" id="rpm">0<span class="unit">rpm</span></div>
            </div>
            
            <div class="card">
                <h2>Steering Angle</h2>
                <div class="value" id="steering">0.0<span class="unit">°</span></div>
            </div>
            
            <div class="card map-container">
                <h2>Vehicle Path</h2>
                <canvas id="map"></canvas>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Laps Completed</div>
                <div class="status-value lap-badge" id="laps">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">Current Lap Distance</div>
                <div class="status-value" id="lap-distance">0.0 m</div>
            </div>
            <div class="status-item">
                <div class="status-label">Total Distance</div>
                <div class="status-value" id="total-distance">0.0 m</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        let pathPoints = [];
        let scale = 10; // pixels per meter
        let offsetX = canvas.width / 2;
        let offsetY = canvas.height / 2;
        
        // Connection status
        socket.on('connect', () => {
            document.getElementById('connection-status').textContent = '● CONNECTED';
            document.getElementById('connection-status').classList.remove('disconnected');
        });
        
        socket.on('disconnect', () => {
            document.getElementById('connection-status').textContent = '● DISCONNECTED';
            document.getElementById('connection-status').classList.add('disconnected');
        });
        
        // Receive state updates
        socket.on('state_update', (data) => {
            // Update text values
            document.getElementById('pos-x').innerHTML = `${data.x.toFixed(2)}<span class="unit">m</span>`;
            document.getElementById('pos-y').innerHTML = `${data.y.toFixed(2)}<span class="unit">m</span>`;
            document.getElementById('heading').innerHTML = `${(data.heading * 180 / Math.PI).toFixed(1)}<span class="unit">°</span>`;
            document.getElementById('velocity').innerHTML = `${data.velocity.toFixed(2)}<span class="unit">m/s</span>`;
            document.getElementById('rpm').innerHTML = `${Math.round(data.rpm)}<span class="unit">rpm</span>`;
            document.getElementById('steering').innerHTML = `${(data.steering_angle * 180 / Math.PI).toFixed(1)}<span class="unit">°</span>`;
            document.getElementById('laps').textContent = data.laps_completed;
            document.getElementById('lap-distance').textContent = `${data.current_lap_distance.toFixed(1)} m`;
            document.getElementById('total-distance').textContent = `${data.total_distance.toFixed(1)} m`;
            
            // Update path
            pathPoints = data.path_points;
            drawPath();
        });
        
        function drawPath() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (pathPoints.length < 2) return;
            
            // Auto-scale to fit path
            const xs = pathPoints.map(p => p.x);
            const ys = pathPoints.map(p => p.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            
            const rangeX = maxX - minX || 1;
            const rangeY = maxY - minY || 1;
            const scaleX = (canvas.width - 40) / rangeX;
            const scaleY = (canvas.height - 40) / rangeY;
            scale = Math.min(scaleX, scaleY, 50); // Max 50 pixels per meter
            
            offsetX = canvas.width / 2 - (minX + maxX) / 2 * scale;
            offsetY = canvas.height / 2 + (minY + maxY) / 2 * scale;
            
            // Draw grid
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            for (let i = -50; i <= 50; i++) {
                ctx.beginPath();
                ctx.moveTo(offsetX + i * scale * 5, 0);
                ctx.lineTo(offsetX + i * scale * 5, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, offsetY - i * scale * 5);
                ctx.lineTo(canvas.width, offsetY - i * scale * 5);
                ctx.stroke();
            }
            
            // Draw origin
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(offsetX, offsetY, 5, 0, 2 * Math.PI);
            ctx.fill();
            
            // Draw path
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 3;
            ctx.beginPath();
            pathPoints.forEach((point, i) => {
                const x = offsetX + point.x * scale;
                const y = offsetY - point.y * scale;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Draw current position
            if (pathPoints.length > 0) {
                const last = pathPoints[pathPoints.length - 1];
                const x = offsetX + last.x * scale;
                const y = offsetY - last.y * scale;
                
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fill();
            }
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            drawPath();
        });
    </script>
</body>
</html>
